<style>
*{
 box-sizing:border-box;
}

body{
 margin:0;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background:#050505;
 font-family:Arial;
 color:white;
 overflow:hidden;
}

.bg{
 position:absolute;
 width:300%;
 height:300%;
 background:linear-gradient(45deg,#00ffff,#ff00ff,#111);
 animation:move 6s infinite;
}

.card{
 position:relative;
 width:340px;
 padding:30px;
 text-align:center;
 background:#000b;
 border-radius:30px;
 box-shadow:0 0 30px #00ffff;
}

.avatar{
 width:110px;
 height:110px;
 border-radius:50%;
 border:4px solid #00ffff;
}

h1{
 color:#00ffff;
}

p{
 color:#ccc;
}

.btn{
 display:block;
 margin:15px;
 padding:15px;
 border-radius:20px;
 background:#ffffff22;
 color:white;
 text-decoration:none;
 transition:.3s;
}

.btn:hover{
 background:#00ffff;
 color:black;
 transform:scale(1.08);
}

@keyframes move{
 0%{transform:translate(-20%,-20%)}
 50%{transform:translate(0,0)}
 100%{transform:translate(-20%,-20%)}
}
</style>
